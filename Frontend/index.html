<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta name="google-site-verification" content="MDGvUJfVd-loPTnMirp-BcM-7A_1Tl_qLOwYPY4lR74" />

    <!-- ============================================================
         PRIMARY SEO TAGS
    ============================================================ -->
    <title>Global Alliance Missionaries | Christian Mission & Church Planting Network</title>
    <meta
      name="description"
      content="Global Alliance Missionaries is a Christian missionary network dedicated to church planting, evangelism, and discipleship across Africa and beyond. Join our mission to reach unreached communities for Christ."
    />
    <meta
      name="keywords"
      content="Global Alliance Missionaries, Christian missionaries, church planting Africa, missionary network, evangelism Kenya, discipleship ministry, missions organization, unreached people groups, Christian outreach, missionary support"
    />
    <meta name="author" content="Global Alliance Missionaries" />
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
    <meta name="language" content="English" />
    <meta name="revisit-after" content="7 days" />
    <meta name="rating" content="general" />

    <!-- ============================================================
         CANONICAL URL — prevents duplicate content penalty
    ============================================================ -->
    <link rel="canonical" href="https://globalalliancemissionaries.com/" />

    <!-- ============================================================
         GEO / LOCATION TAGS
    ============================================================ -->
    <meta name="geo.region" content="KE" />
    <meta name="geo.placename" content="Kenya, Africa" />
    <meta name="ICBM" content="-1.286389, 36.817223" />

    <!-- ============================================================
         OPEN GRAPH — Facebook, LinkedIn, WhatsApp previews
    ============================================================ -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Global Alliance Missionaries" />
    <meta property="og:title" content="Global Alliance Missionaries | Christian Mission & Church Planting Network" />
    <meta
      property="og:description"
      content="Global Alliance Missionaries is a Christian missionary network dedicated to church planting, evangelism, and discipleship across Africa and beyond. Join our mission today."
    />
    <meta property="og:url" content="https://globalalliancemissionaries.com/" />
    <meta property="og:image" content="https://globalalliancemissionaries.com/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Global Alliance Missionaries - Spreading the Gospel across Africa" />
    <meta property="og:locale" content="en_US" />

    <!-- ============================================================
         TWITTER / X CARD
    ============================================================ -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@GlobalAllianceMissionaries" />
    <meta name="twitter:creator" content="@GlobalAllianceMissionaries" />
    <meta name="twitter:title" content="Global Alliance Missionaries | Christian Mission & Church Planting" />
    <meta
      name="twitter:description"
      content="Join Global Alliance Missionaries in spreading the Gospel through church planting, evangelism, and discipleship across Africa and unreached communities worldwide."
    />
    <meta name="twitter:image" content="https://globalalliancemissionaries.com/og-image.jpg" />
    <meta name="twitter:image:alt" content="Global Alliance Missionaries" />

    <!-- ============================================================
         STRUCTURED DATA — JSON-LD (Google Rich Results)
    ============================================================ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Global Alliance Missionaries",
      "alternateName": "GAM",
      "url": "https://globalalliancemissionaries.com",
      "logo": "https://globalalliancemissionaries.com/logo.png",
      "description": "Global Alliance Missionaries is a Christian missionary organization dedicated to church planting, evangelism, discipleship, and reaching unreached communities across Africa and the world.",
      "foundingLocation": {
        "@type": "Place",
        "name": "Kenya, Africa"
      },
      "areaServed": [
        "Kenya",
        "Africa",
        "East Africa"
      ],
      "sameAs": [
        "https://www.facebook.com/GlobalAllianceMissionaries",
        "https://twitter.com/GlobalAllianceMissionaries"
      ],
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "General Inquiry",
        "url": "https://globalalliancemissionaries.com/contact",
        "availableLanguage": "English"
      },
      "knowsAbout": [
        "Christian Missions",
        "Church Planting",
        "Evangelism",
        "Discipleship",
        "Missionary Training",
        "Community Development"
      ]
    }
    </script>

    <!-- ============================================================
         STRUCTURED DATA — WebSite (Enables Google Sitelinks Search)
    ============================================================ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Global Alliance Missionaries",
      "url": "https://globalalliancemissionaries.com",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://globalalliancemissionaries.com/search?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- ============================================================
         FAVICON & APP ICONS
    ============================================================ -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#1a365d" />
    <meta name="msapplication-TileColor" content="#1a365d" />

    <!-- ============================================================
         PERFORMANCE — Preconnect to external origins
    ============================================================ -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
